<!DOCTYPE html>
<!-- Source for og.png (the social share image). Render with:
     chrome --headless --screenshot=og.png --window-size=1200,630 og-card.html -->
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    background: #070b10;
    color: #e9eef2;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  body::before {
    content: "";
    position: absolute;
    left: 50%;
    top: 60%;
    transform: translate(-50%, -50%);
    width: 1400px;
    height: 1400px;
    background: radial-gradient(circle at center, #143038 0%, rgba(20,48,56,0.30) 30%, transparent 60%);
    opacity: 0.6;
    filter: blur(12px);
  }
  .stack { position: relative; text-align: center; }
  .mark {
    font-size: 150px;
    font-weight: 300;
    letter-spacing: 0.42em;
    text-indent: 0.42em;
    text-shadow: 0 0 50px rgba(95,185,142,0.22);
  }
  .tagline {
    font-family: Georgia, "Times New Roman", serif;
    font-size: 46px;
    margin-top: 30px;
    line-height: 1.4;
  }
  .tagline span { color: #7d8b97; }
  .soon {
    margin-top: 44px;
    font-size: 20px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: #7d8b97;
  }
</style>
</head>
<body>
  <div class="stack">
    <div class="mark">MIM</div>
    <div class="tagline">Banks see accounts. <span>People see intentions.</span></div>
    <div class="soon">Coming soon</div>
  </div>
</body>
</html>
